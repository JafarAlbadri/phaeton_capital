services:
  # Dev utility — run with: docker compose --profile tools run list_models
  list_models:
    profiles: ["tools"]
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: bun run apps/worker/scripts/listModels.ts

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sentiment_user
      POSTGRES_PASSWORD: sentiment_password
      POSTGRES_DB: sentiment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sentiment_user -d sentiment_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  db_setup:
    image: oven/bun:latest
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://sentiment_user:sentiment_password@postgres:5432/sentiment_db?schema=public
    # No `|| true` here — if the schema push fails the stack must not start
    # against a stale schema.
    command: sh -c "cd packages/db && bun install && bun run push"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      db_setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://sentiment_user:sentiment_password@postgres:5432/sentiment_db?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gemini-2.5-flash}
      - AI_RPM_LIMIT=${AI_RPM_LIMIT:-4}
      - TARGET_KEYWORD=${TARGET_KEYWORD:-Gold}
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHON_WORKER_URL=http://python_worker:8000
      - WORKER_SECRET=${WORKER_SECRET:-}
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      db_setup:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgresql://sentiment_user:sentiment_password@postgres:5432/sentiment_db?schema=public
      - TARGET_KEYWORD=${TARGET_KEYWORD:-Gold}
      - PYTHON_WORKER_URL=http://python_worker:8000
      - WORKER_URL=http://worker:8080
      - WORKER_SECRET=${WORKER_SECRET:-}
    ports:
      - "3000:3000"

  python_worker:
    build:
      context: apps/python_worker
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  redis_data:
